  upColor: '#26a69a', downColor: '#ef5350',
  borderUpColor: '#26a69a', borderDownColor: '#ef5350',
  wickUpColor: '#26a69a', wickDownColor: '#ef5350',
});
candleSeries.setData(candleData);

// SMA50
const sma50Series = chart.addLineSeries({ color: '#2962ff', lineWidth: 2, title: 'SMA50' });
sma50Series.setData(sma50Data);

// SMA150
const sma150Series = chart.addLineSeries({ color: '#ff9800', lineWidth: 2, title: 'SMA150' });
sma150Series.setData(sma150Data);

// SMA250
const sma250Series = chart.addLineSeries({ color: '#f44336', lineWidth: 2, title: 'SMA250' });
sma250Series.setData(sma250Data);

// 水平線（エントリー・損切・目標）
function addHLine(price, color, style, title) {
  const s = chart.addLineSeries({
    color, lineWidth: 1, lineStyle: style,
    lastValueVisible: true, priceLineVisible: false,
    title,
  });
  const t0 = candleData[0].time;
  const t1 = candleData[candleData.length - 1].time;
  s.setData([{time: t0, value: price}, {time: t1, value: price}]);
}
const LS = LightweightCharts.LineStyle;
addHLine(ENTRY,   '#26a69a', LS.Dashed,  'Entry 4,800');
addHLine(STOP,    '#ef5350', LS.Dashed,  'Stop 4,270');
addHLine(TARGET1, '#ffeb3b', LS.Dashed,  'T1 6,390');
addHLine(TARGET2, '#ab47bc', LS.Dotted,  'T2 7,450');

// ── 出来高チャート ──
const volChart = LightweightCharts.createChart(document.getElementById('vol-chart'), {
  layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
  grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
  rightPriceScale: { borderColor: '#2a2e39', scaleMargins: { top: 0.1, bottom: 0 } },
  timeScale: { borderColor: '#2a2e39', timeVisible: true },
  handleScroll: true, handleScale: true,
});
const volSeries = volChart.addHistogramSeries({
  priceFormat: { type: 'volume' },
  priceScaleId: 'right',
});
volSeries.setData(volumeData);

// チャート同期
chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
  if (range) volChart.timeScale().setVisibleLogicalRange(range);
});
volChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
  if (range) chart.timeScale().setVisibleLogicalRange(range);
});

// 直近データにフィット
chart.timeScale().fitContent();
volChart.timeScale().fitContent();

// リサイズ対応
window.addEventListener('resize', () => {
  chart.applyOptions({ width: document.getElementById('chart').clientWidth });
  volChart.applyOptions({ width: document.getElementById('vol-chart').clientWidth });
});
</script>
</body>
</html>
