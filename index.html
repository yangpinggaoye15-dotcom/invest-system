<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Minervini Terminal</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.logo{font-size:15px;font-weight:600;color:#f0b429}.logo span{color:#8b949e;font-weight:400;font-size:12px;margin-left:8px}.updated{font-size:11px;color:#8b949e}.nav{display:flex;background:#161b22;border-bottom:1px solid #30363d;overflow-x:auto}.nav-btn{padding:10px 16px;font-size:13px;color:#8b949e;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}.nav-btn.active{color:#f0b429;border-bottom-color:#f0b429}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#30363d}.metric{background:#161b22;padding:12px 14px}.metric-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}.metric-value{font-size:20px;font-weight:600}.gold{color:#f0b429}.green{color:#3fb950}.red{color:#f85149}.muted{color:#8b949e}.filter-row{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;border-bottom:1px solid #21262d;background:#0d1117}.filter-btn{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid #30363d;background:#161b22;color:#8b949e;cursor:pointer;white-space:nowrap;flex-shrink:0}.filter-btn.active{background:#f0b429;color:#0d1117;border-color:#f0b429;font-weight:600}.section-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #21262d;background:#0d1117}.section-title{font-size:12px;font-weight:600;color:#f0b429;text-transform:uppercase;letter-spacing:.6px}.section-count{font-size:12px;color:#8b949e}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px;min-width:420px}th{padding:8px 10px;text-align:left;font-size:10px;color:#8b949e;font-weight:500;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid #21262d;background:#161b22;white-space:nowrap}th.r{text-align:right}td{padding:10px;border-bottom:1px solid #161b22;white-space:nowrap}td.r{text-align:right}tr:hover{background:#161b22;cursor:pointer}.code{font-family:monospace;font-size:13px;color:#79c0ff;font-weight:600}.name{font-size:12px;color:#e6edf3;max-width:130px;overflow:hidden;text-overflow:ellipsis}.price-val{font-family:monospace;font-size:13px}.pct-hot{color:#f0b429;font-weight:600;font-size:12px}.pct-warm{color:#3fb950;font-size:12px}.pct-cold{color:#8b949e;font-size:12px}.rs-pos{color:#3fb950;font-family:monospace;font-size:12px}.rs-neg{color:#f85149;font-family:monospace;font-size:12px}.rs-neu{color:#8b949e;font-family:monospace;font-size:12px}.dots{display:flex;gap:2px;align-items:center}.dot{width:7px;height:7px;border-radius:50%}.dot.on{background:#f0b429}.dot.off{background:#30363d}.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px}.spinner{width:28px;height:28px;border:2px solid #30363d;border-top-color:#f0b429;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:13px;color:#8b949e}.error-box{margin:20px 16px;padding:14px 16px;background:#1c0a0a;border:1px solid #6e1a1a;border-radius:8px;font-size:13px;color:#f85149}.detail-panel{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #30363d;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .25s ease;z-index:200;max-height:70vh;overflow-y:auto}.detail-panel.open{transform:translateY(0)}.detail-handle{width:36px;height:4px;background:#30363d;border-radius:2px;margin:10px auto 0}.detail-content{padding:16px}.detail-title{font-size:16px;font-weight:600;color:#f0b429;margin-bottom:4px}.detail-code{font-size:13px;color:#8b949e;margin-bottom:16px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.detail-card{background:#0d1117;border-radius:8px;padding:12px}.detail-card-label{font-size:11px;color:#8b949e;margin-bottom:4px}.detail-card-value{font-size:18px;font-weight:600}.conditions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cond{display:flex;align-items:center;gap:8px;background:#0d1117;border-radius:8px;padding:10px 12px}.cond-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}.cond-icon.pass{background:#0d2d15;color:#3fb950}.cond-icon.fail{background:#1c0a0a;color:#f85149}.cond-text{font-size:11px;color:#8b949e}.close-btn{width:100%;padding:14px;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#8b949e;font-size:14px;cursor:pointer;margin-top:8px}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;display:none}.overlay.show{display:block}.page{display:none}.page.active{display:block}.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px}.coming-soon-title{font-size:16px;font-weight:600;color:#f0b429}.coming-soon-text{font-size:13px;color:#8b949e;text-align:center}</style></head><body><div class="header"><div class="logo">MINERVINI TERMINAL <span>yohei</span></div><div class="updated" id="updated">読み込み中...</div></div><div class="nav"><button class="nav-btn active" onclick="showPage('screening',this)">スクリーニング</button><button class="nav-btn" onclick="showPage('chart',this)">チャート</button><button class="nav-btn" onclick="showPage('fins',this)">業績</button><button class="nav-btn" onclick="showPage('portfolio',this)">ポートフォリオ</button></div><div class="page active" id="page-screening"><div class="metrics"><div class="metric"><div class="metric-label">対象銘柄</div><div class="metric-value muted" id="m-total">-</div></div><div class="metric"><div class="metric-label">PASS 6/7+</div><div class="metric-value green" id="m-pass">-</div></div><div class="metric"><div class="metric-label">満点 7/7</div><div class="metric-value gold" id="m-perfect">-</div></div><div class="metric"><div class="metric-label">高値更新圏</div><div class="metric-value gold" id="m-nearhigh">-</div></div></div><div class="filter-row"><button class="filter-btn active" onclick="setFilter('all',this)">全て</button><button class="filter-btn" onclick="setFilter('perfect',this)">7/7満点</button><button class="filter-btn" onclick="setFilter('nearhigh',this)">高値更新圏</button><button class="filter-btn" onclick="setSort('rs26w',this)">RS26w強い順</button><button class="filter-btn" onclick="setSort('high_pct',this)">高値比順</button></div><div class="section-header"><div class="section-title">PASS銘柄一覧</div><div class="section-count" id="display-count">-</div></div><div id="screening-content"><div class="loading"><div class="spinner"></div><div class="loading-text">データを読み込み中...</div></div></div></div><div class="page" id="page-chart"><div class="coming-soon"><div class="coming-soon-title">週足チャート</div><div class="coming-soon-text">SMA 50/150/200日線チャートを実装予定</div></div></div><div class="page" id="page-fins"><div class="coming-soon"><div class="coming-soon-title">業績分析</div><div class="coming-soon-text">売上・EPS推移グラフを実装予定</div></div></div><div class="page" id="page-portfolio"><div class="coming-soon"><div class="coming-soon-title">ポートフォリオ</div><div class="coming-soon-text">保有株・含み損益管理を実装予定</div></div></div><div class="overlay" id="overlay" onclick="closeDetail()"></div><div class="detail-panel" id="detail-panel"><div class="detail-handle"></div><div class="detail-content" id="detail-content"></div></div><script>const DATA_URL="https://raw.githubusercontent.com/yangpinggaoye15-dotcom/invest-system/main/data/screen_full_results.json";let allData=[],currentFilter="all",currentSort="score";const CL=["Price > SMA150/200","SMA150 > SMA200","SMA200 上昇中","SMA50 > SMA150/200","Price > SMA50","Price > 52wLow x1.25","Price > 52wHigh x0.75"];async function loadData(){try{const r=await fetch(DATA_URL+"?t="+Date.now());if(!r.ok)throw new Error("HTTP "+r.status);const j=await r.json();const m=j["__meta__"]||{};allData=Object.entries(j).filter(([k,v])=>k!=="__meta__"&&!v.error&&v.passed!==undefined).map(([k,v])=>v);const p=allData.filter(x=>x.passed).length,pf=allData.filter(x=>x.score==="7/7").length,nh=allData.filter(x=>x.passed&&x.high52&&x.price>=x.high52*0.95).length;document.getElementById("m-total").textContent=(m.total||allData.length).toLocaleString();document.getElementById("m-pass").textContent=p.toLocaleString();document.getElementById("m-perfect").textContent=pf.toLocaleString();document.getElementById("m-nearhigh").textContent=nh.toLocaleString();document.getElementById("updated").textContent="更新: "+(m.finished_at?m.finished_at.replace("T"," ").slice(0,16):"-");renderTable();}catch(e){document.getElementById("screening-content").innerHTML="<div class=\"error-box\">読み込み失敗: "+e.message+"</div>";}}function getFiltered(){let d=allData.filter(x=>x.passed);if(currentFilter==="perfect")d=d.filter(x=>x.score==="7/7");if(currentFilter==="nearhigh")d=d.filter(x=>x.high52&&x.price>=x.high52*0.95);d.sort((a,b)=>{if(currentSort==="rs26w")return(b.rs26w??-99)-(a.rs26w??-99);if(currentSort==="high_pct"){const ap=a.high52?a.price/a.high52:0,bp=b.high52?b.price/b.high52:0;return bp-ap;}return parseInt(b.score)-parseInt(a.score);});return d;}function renderTable(){const d=getFiltered();document.getElementById("display-count").textContent=d.length+"件";if(!d.length){document.getElementById("screening-content").innerHTML="<div class=\"loading\"><div class=\"loading-text\">該当銘柄なし</div></div>";return;}let h="<div class=\"table-wrap\"><table><thead><tr><th>コード</th><th>銘柄名</th><th>スコア</th><th class=\"r\">株価</th><th class=\"r\">高値比</th><th class=\"r\">RS6w</th><th class=\"r\">RS26w</th></tr></thead><tbody>";d.forEach((s,i)=>{const n=parseInt(s.score),dots=Array.from({length:7},(_,j)=>"<div class=\"dot "+(j<n?"on":"off")+"\"></div>").join(""),hp=s.high52?(s.price/s.high52*100):null,pc=hp>=98?"pct-hot":hp>=95?"pct-warm":"pct-cold",ps=hp?hp.toFixed(1)+"%":"-",rc=v=>v==null?"rs-neu":v>0?"rs-pos":"rs-neg",rs=v=>v==null?"N/A":(v>0?"+":"")+v.toFixed(2);h+="<tr onclick=\"showDetail("+i+")\"><td class=\"code\">"+s.code+"</td><td class=\"name\">"+(s.name||"-")+"</td><td><div class=\"dots\">"+dots+"</div></td><td class=\"r price-val\">"+Number(s.price).toLocaleString()+"</td><td class=\"r\"><span class=\""+pc+"\">"+ps+"</span></td><td class=\"r\"><span class=\""+rc(s.rs6w)+"\">"+rs(s.rs6w)+"</span></td><td class=\"r\"><span class=\""+rc(s.rs26w)+"\">"+rs(s.rs26w)+"</span></td></tr>";});h+="</tbody></table></div>";document.getElementById("screening-content").innerHTML=h;window._fd=d;}function setFilter(f,btn){currentFilter=f;currentSort="score";document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderTable();}function setSort(s,btn){currentSort=s;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderTable();}function showDetail(idx){const s=(window._fd||[])[idx];if(!s)return;const hp=s.high52?(s.price/s.high52*100).toFixed(1)+"%":"-",rs=v=>v==null?"N/A":(v>0?"+":"")+v.toFixed(2),rc=v=>v==null?"muted":v>0?"green":"red",cc=(s.conditions||[]).map((p,i)=>"<div class=\"cond\"><div class=\"cond-icon "+(p?"pass":"fail")+"\">"+(p?"&#10003;":"&#10007;")+"</div><div class=\"cond-text\">"+(CL[i]||"")+"</div></div>").join("");document.getElementById("detail-content").innerHTML="<div class=\"detail-title\">"+(s.name||s.code)+"</div><div class=\"detail-code\">"+s.code+" | "+s.score+" | "+hp+"</div><div class=\"detail-grid\"><div class=\"detail-card\"><div class=\"detail-card-label\">株価</div><div class=\"detail-card-value\">"+Number(s.price).toLocaleString()+"</div></div><div class=\"detail-card\"><div class=\"detail-card-label\">52週高値</div><div class=\"detail-card-value gold\">"+Number(s.high52||0).toLocaleString()+"</div></div><div class=\"detail-card\"><div class=\"detail-card-label\">RS6w</div><div class=\"detail-card-value "+rc(s.rs6w)+"\">"+rs(s.rs6w)+"</div></div><div class=\"detail-card\"><div class=\"detail-card-label\">RS26w</div><div class=\"detail-card-value "+rc(s.rs26w)+"\">"+rs(s.rs26w)+"</div></div></div><div style=\"font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;\">7条件チェック</div><div class=\"conditions-grid\">"+cc+"</div><button class=\"close-btn\" onclick=\"closeDetail()\">閉じる</button>";document.getElementById("detail-panel").classList.add("open");document.getElementById("overlay").classList.add("show");}function closeDetail(){document.getElementById("detail-panel").classList.remove("open");document.getElementById("overlay").classList.remove("show");}function showPage(n,btn){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));document.getElementById("page-"+n).classList.add("active");btn.classList.add("active");}loadData();</script></body></html>
