<div class="overlay" id="overlay" onclick="closeDetail()"></div><div class="detail-panel" id="detail-panel"><div class="detail-handle"></div><div class="detail-content" id="detail-content"></div></div><script>const DATA_URL="https://raw.githubusercontent.com/yangpinggaoye15-dotcom/invest-data/main/screen_full_results.json";const CLAUDE_API="https://api.anthropic.com/v1/messages";const GEMINI_API="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";let allData=[],rsOn=false,ytdOn=false,curTab="news";const CL=["Price > SMA150/200","SMA150 > SMA200","SMA200 上昇中","SMA50 > SMA150/200","Price > SMA50","Price > 52wLow x1.25","Price > 52wHigh x0.75"];function gk(k){return localStorage.getItem(k)||""}function sk(k,v){localStorage.setItem(k,v)}async function loadData(){try{const r=await fetch(DATA_URL+"?t="+Date.now());if(!r.ok)throw new Error("HTTP "+r.status);const j=await r.json();const m=j["__meta__"]||{};allData=Object.entries(j).filter(([k,v])=>k!=="__meta__"&&!v.error&&v.passed!==undefined).map(([k,v])=>v);const p=allData.filter(x=>x.passed).length,pf=allData.filter(x=>x.score==="7/7").length,nh=allData.filter(x=>x.passed&&x.high52&&x.price>=x.high52*0.95).length;document.getElementById("m-total").textContent=(m.total||allData.length).toLocaleString();document.getElementById("m-pass").textContent=p.toLocaleString();document.getElementById("m-perfect").textContent=pf.toLocaleString();document.getElementById("m-nearhigh").textContent=nh.toLocaleString();document.getElementById("updated").textContent="更新: "+(m.finished_at?m.finished_at.replace("T"," ").slice(0,16):"-");applyFilters();}catch(e){document.getElementById("screening-content").innerHTML='<div class="error-box">読み込み失敗: '+e.message+"</div>";}}function updateLabel(sid,lid,fn){const v=parseInt(document.getElementById(sid).value);document.getElementById(lid).textContent=fn(v);applyFilters();}function toggleRS(){rsOn=!rsOn;document.getElementById("rs-toggle").classList.toggle("on",rsOn);document.getElementById("rs-label").textContent=rsOn?"プラスのみ":"全て表示";applyFilters();}function resetFilters(){document.getElementById("search-input").value="";document.getElementById("score-slider").value=6;document.getElementById("highpct-slider").value=90;document.getElementById("score-val").textContent="6/7以上";document.getElementById("highpct-val").textContent="90%以上";document.getElementById("sort-select").value="score";rsOn=false;document.getElementById("rs-toggle").classList.remove("on");document.getElementById("rs-label").textContent="全て表示";const ci=document.getElementById("custom-input");if(ci)ci.value="";volOn=false;const vb=document.getElementById("vol-btn");if(vb){vb.style.background="none";vb.style.color="#8b949e";vb.style.borderColor="#30363d";}ytdOn=false;const yb=document.getElementById("ytd-btn");if(yb){yb.style.background="none";yb.style.color="#8b949e";yb.style.borderColor="#30363d";}applyFilters();}function applyFilters(){const q=document.getElementById("search-input").value.toLowerCase();const ms=parseInt(document.getElementById("score-slider").value);const mh=parseInt(document.getElementById("highpct-slider").value)/100;const sb=document.getElementById("sort-select").value;let d=allData.filter(x=>x.passed&&parseInt(x.score)>=ms);d=d.filter(x=>!x.high52||x.price/x.high52>=mh);if(rsOn)d=d.filter(x=>x.rs26w!=null&&x.rs26w>0);if(ytdOn)d=d.filter(x=>x.ytd_high&&x.price>=x.ytd_high*0.98);if(volOn)d=d.filter(x=>x.vol_ratio!=null&&x.vol_ratio>=1.5);
  const customExpr=document.getElementById("custom-input")?.value?.trim();

  if(customExpr){
    try{
      d=d.filter(x=>evalCustomFilter(x,customExpr));
      if(errEl){errEl.textContent="";errEl.classList.remove("show");}
