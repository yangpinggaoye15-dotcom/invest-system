name: Daily Investment Teams

on:
  schedule:
    - cron: '30 11 * * *'  # 毎日 20:30 JST（平日: 市場分析 / 土: 週次振り返り / 日: 翌週準備）
  workflow_run:
    workflows: ["Daily Stock Screening"]
    types: [completed]
  workflow_dispatch:

jobs:
  run-teams:
    runs-on: ubuntu-latest
    # スクリーニング成功後 / 毎日定時 / 手動実行
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Clone invest-data (for latest screening data)
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${DATA_REPO_TOKEN}@github.com/yangpinggaoye15-dotcom/invest-data.git invest-data

      - name: Run all investment teams
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API: ${{ secrets.GEMINI_API }}
          INVEST_DATA_DIR: invest-data
        run: python run_teams.py all

      - name: Push reports to invest-data repo
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          TODAY=$(date +'%Y-%m-%d')
          mkdir -p invest-data/reports
          # 最新版として上書きコピー（常に最新を参照できる）
          cp reports/daily/*.md invest-data/reports/ 2>/dev/null || true
          [ -f reports/daily/kpi_log.json ] && cp reports/daily/kpi_log.json invest-data/reports/ || true
          [ -f reports/daily/simulation_log.json ] && cp reports/daily/simulation_log.json invest-data/reports/ || true
          [ -f reports/audit_log.md ] && cp reports/audit_log.md invest-data/reports/ || true
          [ -f reports/daily/shared_context.md ] && cp reports/daily/shared_context.md invest-data/reports/ || true
          # 日付付きチームレポートを保存（過去日付ナビ用）
          for team in info_gathering analysis risk strategy internal_audit security verification hr_report; do
            [ -f reports/daily/${team}.md ] && cp reports/daily/${team}.md invest-data/reports/${TODAY}_${team}.md || true
          done
          cd invest-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "teams: $(date +'%Y-%m-%d')"
          git push
