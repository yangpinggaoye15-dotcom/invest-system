name: Daily Stock Screening

on:
  schedule:
    # 毎日15:05 JST = 06:05 UTC（平日のみ）
    - cron: '5 6 * * 1-5'
  workflow_dispatch:  # GitHubから手動実行も可能

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write  # リポジトリへのコミット権限

    steps:
      # ① リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # ② Pythonセットアップ（依存ライブラリをキャッシュして高速化）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ③ 必要なライブラリをインストール
      - name: Install dependencies
        run: pip install requests pandas

      # ④ スクリーニング実行（差分更新モード）
      - name: Run screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python run_screen_full.py --update

      # ⑤ 結果をリポジトリにコミット＆プッシュ
      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screen_full_results.json data/screen_full_progress.json data/screen_full.log
          # 変更がなければコミットしない
          git diff --cached --quiet || git commit -m "daily screening $(date +'%Y-%m-%d')"
          git push

      # ⑥ ログをArtifactにも保存（デバッグ用・7日間保持）
      - name: Save log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screening-log-${{ github.run_id }}
          path: data/screen_full.log
          retention-days: 7
