name: Daily Stock Screening

on:
  schedule:
    - cron: '30 9 * * 1-5'  # 毎平日 18:30 JST
  workflow_dispatch:
    inputs:
      fresh:
        description: '全銘柄フル取得（週次リセット用）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pandas plotly mcp yfinance

      - name: Restore CSV cache
        uses: actions/cache@v4
        with:
          path: csv_output
          key: csv-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            csv-${{ runner.os }}-

      - name: Run screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          INVEST_BASE_DIR: ${{ github.workspace }}
        run: |
          mkdir -p data csv_output
          # 月曜 or 手動fresh=true の場合はフル取得、それ以外は差分更新
          DOW=$(date +'%u')  # 1=月曜
          FRESH_INPUT="${{ github.event.inputs.fresh }}"
          if [ "$FRESH_INPUT" = "true" ] || [ "$DOW" = "1" ]; then
            echo "FRESH MODE（月曜 or 手動指定）"
            python run_screen_full.py --fresh
          else
            echo "UPDATE MODE（差分更新 - 直近5日のみ取得）"
            python run_screen_full.py --update
          fi

      - name: Export chart, pattern, and financial data
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          INVEST_BASE_DIR: ${{ github.workspace }}
          INVEST_GITHUB_DIR: ${{ github.workspace }}
        run: |
          python -c "
          import stock_mcp_server as s
          print(s.export_chart_data())
          print(s.export_fins_data())
          print(s.export_site_data())
          "
          python -c "
          import run_screen_full as r
          r.export_index_data()
          "

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/screen_full_results.json || true
          git add -f data/screen_full_progress.json || true
          git add -f data/screen_full.log || true
          git diff --cached --quiet || git commit -m "screening $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push

      - name: Sync to invest-data repo
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${DATA_REPO_TOKEN}@github.com/yangpinggaoye15-dotcom/invest-data.git invest-data-repo
          cp data/screen_full_results.json invest-data-repo/screen_full_results.json
          for f in chart_data.json pattern_data.json fins_data.json timeline_data.json knowledge_data.json watchlist.json portfolio.json index_data.json; do
            [ -f "$f" ] && cp "$f" invest-data-repo/ || true
          done
          cd invest-data-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: $(date +'%Y-%m-%d')"
          git push

      - name: Save log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screening-log-${{ github.run_id }}
          path: data/screen_full.log
          retention-days: 7
