name: Daily Stock Screening

on:
  schedule:
    - cron: '5 6 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run screening
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python run_screen_full.py --update

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git diff --cached --quiet || git commit -m "daily screening $(date +'%Y-%m-%d')"
          git push

      - name: Save log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screening-log-${{ github.run_id }}
          path: data/screen_full.log
          retention-days: 7